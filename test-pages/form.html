<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>译伴 Form Fixture</title>
  </head>
  <body>
    <h1>Account settings</h1>
    <p>This paragraph can be translated, but form values should be ignored.</p>
    <form>
      <label>
        Email
        <input value="private@example.com" />
      </label>
      <label>
        Notes
        <textarea>Do not translate this private note.</textarea>
      </label>
    </form>
  </body>
</html>
