<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>译伴 Roadmap Fixture</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: 48px 64px;
        background: #111;
        color: #f4f0ea;
      }

      .roadmap {
        display: grid;
        gap: 24px;
        max-width: 720px;
      }

      .roadmap a {
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 20px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        color: inherit;
        text-decoration: none;
      }

      .roadmap .rt {
        font-size: 18px;
        font-weight: 600;
      }

      .roadmap .rc {
        font-size: 14px;
        color: #cfc8be;
      }

      .intro {
        margin-top: 40px;
        font-size: 18px;
        line-height: 1.6;
        color: #cfc8be;
      }

      .nested {
        margin-top: 24px;
        padding: 16px;
        border: 1px dashed rgba(255, 255, 255, 0.2);
        border-radius: 10px;
      }

      .nested span {
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <!--
      Regression expectations after translation:
      - span.rt[data-yiban-host|data-yiban-translated] > .yiban-target-wrapper
      - span.rc[data-yiban-host|data-yiban-translated] > .yiban-target-wrapper
      - div.intro[data-yiban-host|data-yiban-translated] > .yiban-target-wrapper
      - div.nested > span[data-yiban-translated] > .yiban-target-wrapper (not on nested div)
      - No data-yiban-render-mode anywhere
    -->
    <div class="roadmap">
      <a href="#">
        <span class="rt">Set up the brief skill</span>
        <span class="rc">Set up once</span>
      </a>
    </div>

    <div class="intro">Plain div text without paragraph tag.</div>

    <div class="nested">
      <span>Inner span inside layout div</span>
    </div>

    <script>
      window.__yibanRoadmapChecks = () => {
        const checks = [
          ['span.rt', (el) => el.querySelector(':scope > .yiban-target-wrapper') !== null],
          ['span.rc', (el) => el.querySelector(':scope > .yiban-target-wrapper') !== null],
          ['div.intro', (el) => el.querySelector(':scope > .yiban-target-wrapper') !== null],
          ['div.nested > span', (el) => el.querySelector(':scope > .yiban-target-wrapper') !== null],
        ];

        const cardSpans = [...document.querySelectorAll('.roadmap a > span')];

        return {
          sniffedHosts: [...document.querySelectorAll('[data-yiban-host="1"]')].map((el) => ({
            tag: el.tagName,
            mode: el.dataset.yibanHostMode,
            text: el.textContent?.slice(0, 40),
          })),
          cardSpansIndependentInline: cardSpans.map((span) => ({
            className: span.className,
            hostMode: span.dataset.yibanHostMode,
            marked: span.hasAttribute('data-yiban-host') || span.hasAttribute('data-yiban-translated'),
          })),
          checks: checks.map(([selector, predicate]) => {
            const element = document.querySelector(selector);
            return {
              selector,
              hostMode: element instanceof HTMLElement ? element.dataset.yibanHostMode : null,
              hostMarked:
                element?.hasAttribute('data-yiban-host') || element?.hasAttribute('data-yiban-translated'),
              wrapperInside: element instanceof HTMLElement ? predicate(element) : false,
            };
          }),
        };
      };
    </script>
  </body>
</html>
